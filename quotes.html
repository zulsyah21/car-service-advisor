<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Get Quotation - Service Advisor</title>
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        /* ── Print Styles ── */
        @media print {
            body * { visibility: hidden; }
            #print-area, #print-area * { visibility: visible; }
            #print-area {
                position: fixed;
                top: 0; left: 0;
                width: 100%;
                padding: 2rem;
                font-family: 'Segoe UI', Arial, sans-serif;
                color: #111;
                background: white;
            }
            .no-print { display: none !important; }
        }

        #print-area {
            display: none;
        }

        /* Print receipt layout */
        .print-header {
            text-align: center;
            border-bottom: 2px solid #333;
            padding-bottom: 1rem;
            margin-bottom: 1.5rem;
        }
        .print-header h2 { font-size: 1.4rem; margin: 0; }
        .print-header p  { font-size: 0.85rem; color: #555; margin: 4px 0 0; }
        .print-meta { display: flex; justify-content: space-between; margin-bottom: 1.5rem; font-size: 0.88rem; color: #333; }
        .print-table { width: 100%; border-collapse: collapse; margin-bottom: 1rem; }
        .print-table th { background: #222; color: white; padding: 8px 10px; text-align: left; font-size: 0.82rem; }
        .print-table td { padding: 7px 10px; border-bottom: 1px solid #ddd; font-size: 0.82rem; color: #222; }
        .print-total { text-align: right; font-size: 1.1rem; font-weight: bold; color: #e31837; border-top: 2px solid #333; padding-top: 0.75rem; }
        .print-footer { text-align: center; margin-top: 2rem; font-size: 0.78rem; color: #888; }
    </style>
</head>

<body>

    <header class="navbar" id="main-navbar">
        <a href="index.html" class="nav-brand" id="nav-brand-link">
            <img src="images/perodua_logo.png" alt="Perodua Logo">
        </a>
        <nav class="nav-links" id="main-nav-links">
            <a href="index.html">Home</a>
            <a class="active" href="quotes.html">Quotes</a>
            <a href="knowledge.html">Knowledge Hub</a>
            <a href="locate.html">Locate</a>
        </nav>
        <div class="nav-auth" id="main-nav-auth">
            <a href="signin.html">Sign In</a>
        </div>
    </header>

    <div class="main-content">
        <div class="page-container">
            <h2 class="section-title"><i class="fas fa-file-invoice-dollar"></i> Generate Quotation</h2>

            <div class="form-group">
                <label>Car Model</label>
                <select id="model-select" class="form-control">
                    <option value="">Select Model</option>
                    <!-- Populated by JS -->
                </select>
            </div>

            <div class="form-group">
                <label>Variant</label>
                <select id="variant-select" class="form-control">
                    <option value="">Select Variant</option>
                    <!-- Populated by JS -->
                </select>
            </div>

            <div class="form-group">
                <label>Region</label>
                <select id="region-select" class="form-control">
                    <option value="Peninsular">Peninsular Malaysia</option>
                    <option value="EM">East Malaysia (Sabah &amp; Sarawak)</option>
                </select>
            </div>

            <div class="form-group">
                <label>Current Mileage (km)</label>
                <input type="number" id="mileage-input" class="form-control" placeholder="e.g. 10000">
            </div>

            <button id="generate-quote-btn" class="btn-primary" style="width:100%">Generate Quote</button>

            <!-- Results Section -->
            <div id="quote-result-section" style="display:none; margin-top:2rem;">
                <h3 style="color:var(--primary-green); border-bottom:2px solid #ddd; padding-bottom:10px;">Quotation
                    Details</h3>

                <table class="data-table" id="quote-table">
                    <thead>
                        <tr>
                            <th>Part Name</th>
                            <th>Code</th>
                            <th>Price</th>
                            <th>Type</th>
                            <th>Total</th>
                        </tr>
                    </thead>
                    <tbody>
                        <!-- Rows -->
                    </tbody>
                </table>

                <div
                    style="text-align:right; margin-top:1rem; font-size:1.5rem; font-weight:bold; color:var(--primary-red);">
                    Total: <span id="grand-total">RM 0.00</span>
                </div>

                <div style="margin-top:2rem; display:flex; gap:1rem;">
                    <button class="btn-primary" id="save-generated-quote-btn"><i class="fas fa-save"></i> Save Quote</button>
                    <button class="btn-secondary" id="print-quote-btn" onclick="printCurrentQuote()"><i class="fas fa-print"></i> Print / Save PDF</button>
                </div>
            </div>
        </div>
    </div>

    <!-- Hidden Print Area -->
    <div id="print-area"></div>

    <!-- Chatbot (Included everywhere) -->
    <div class="chatbot-toggle">
        <i class="fas fa-comment-dots"></i>
    </div>
    <div class="chatbot-container">
        <div class="chatbot-header">
            <span>24/7 AI CHATBOT</span>
            <i class="fas fa-times close-chat" style="cursor:pointer; opacity:0.7;"></i>
        </div>
        <div class="chatbot-body" id="chat-body">
            <div class="msg bot-msg">Hello, how can I help you?</div>
        </div>
        <div class="chatbot-footer">
            <input type="text" id="chat-input-text" placeholder="Type your message">
            <button id="chat-send-btn"><i class="fas fa-paper-plane"></i></button>
        </div>
    </div>

    <script src="js/db-init.js"></script>
    <script src="js/script.js"></script>
    <script src="js/quotes-logic.js"></script>

    <script>
        function printCurrentQuote() {
            // Gather quote data from the visible table
            const rows = document.querySelectorAll('#quote-table tbody tr');
            const total = document.getElementById('grand-total').textContent;
            const model = document.getElementById('model-select').options[document.getElementById('model-select').selectedIndex]?.text || '';
            const variant = document.getElementById('variant-select').options[document.getElementById('variant-select').selectedIndex]?.text || '';
            const mileage = document.getElementById('mileage-input').value || '';
            const region = document.getElementById('region-select').options[document.getElementById('region-select').selectedIndex]?.text || '';
            const today = new Date().toLocaleDateString('en-MY', { year: 'numeric', month: 'long', day: 'numeric' });

            let rowsHTML = '';
            rows.forEach(row => {
                const cells = row.querySelectorAll('td');
                if (cells.length >= 5) {
                    rowsHTML += `<tr>
                        <td>${cells[0].textContent}</td>
                        <td>${cells[1].textContent}</td>
                        <td>${cells[2].textContent}</td>
                        <td>${cells[3].textContent}</td>
                        <td>${cells[4].textContent}</td>
                    </tr>`;
                }
            });

            const printArea = document.getElementById('print-area');
            printArea.innerHTML = `
                <div class="print-header">
                    <h2>Service Quotation</h2>
                    <p>Web-Based Automated Car Service Advisor (WACSA)</p>
                </div>
                <div class="print-meta">
                    <div>
                        <strong>Vehicle:</strong> ${model} — ${variant}<br>
                        <strong>Mileage:</strong> ${parseInt(mileage).toLocaleString()} km<br>
                        <strong>Region:</strong> ${region}
                    </div>
                    <div style="text-align:right;">
                        <strong>Date:</strong> ${today}<br>
                        <strong>Quote ID:</strong> #${Date.now().toString(36).toUpperCase()}
                    </div>
                </div>
                <table class="print-table">
                    <thead>
                        <tr>
                            <th>Part / Service</th>
                            <th>Code</th>
                            <th>Unit Price</th>
                            <th>Type</th>
                            <th>Subtotal</th>
                        </tr>
                    </thead>
                    <tbody>${rowsHTML}</tbody>
                </table>
                <div class="print-total">Grand Total: ${total}</div>
                <div class="print-footer">
                    Thank you for using WACSA — Authorised Perodua Service Advisor System<br>
                    Printed on ${today}
                </div>
            `;

            printArea.style.display = 'block';
            window.print();
            printArea.style.display = 'none';
        }
    </script>
</body>

</html>
