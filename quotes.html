<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Get Quotation - Service Advisor</title>
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>

<body>

    <header class="navbar" id="main-navbar">
        <a href="index.html" class="nav-brand" id="nav-brand-link">
            <img src="images/perodua_logo.png" alt="Perodua Logo">
        </a>
        <nav class="nav-links" id="main-nav-links">
            <a href="index.html">Home</a>
            <a class="active" href="quotes.html">Quotes</a>
            <a href="knowledge.html">Knowledge Hub</a>
            <a href="locate.html">Locate</a>
        </nav>
        <div class="nav-auth" id="main-nav-auth">
            <a href="signin.html">Sign In</a>
        </div>
    </header>

    <div class="main-content">
        <div class="page-container">
            <h2 class="section-title"><i class="fas fa-file-invoice-dollar"></i> Generate Quotation</h2>

            <div class="form-group">
                <label>Car Model</label>
                <select id="model-select" class="form-control">
                    <option value="">Select Model</option>
                    <!-- Populated by JS -->
                </select>
            </div>

            <div class="form-group">
                <label>Variant</label>
                <select id="variant-select" class="form-control">
                    <option value="">Select Variant</option>
                    <!-- Populated by JS -->
                </select>
            </div>

            <div class="form-group">
                <label>Region</label>
                <select id="region-select" class="form-control">
                    <option value="Peninsular">Peninsular Malaysia</option>
                    <option value="EM">East Malaysia (Sabah & Sarawak)</option>
                </select>
            </div>

            <div class="form-group">
                <label>Current Mileage (km)</label>
                <input type="number" id="mileage-input" class="form-control" placeholder="e.g. 10000">
            </div>

            <button id="generate-quote-btn" class="btn-primary" style="width:100%">Generate Quote</button>

            <!-- Results Section -->
            <div id="quote-result-section" style="display:none; margin-top:2rem;">
                <h3 style="color:var(--primary-green); border-bottom:2px solid #ddd; padding-bottom:10px;">Quotation
                    Details</h3>

                <table class="data-table" id="quote-table">
                    <thead>
                        <tr>
                            <th>Part Name</th>
                            <th>Code</th>
                            <th>Price</th>
                            <th>Type</th>
                            <th>Total</th>
                        </tr>
                    </thead>
                    <tbody>
                        <!-- Rows -->
                    </tbody>
                </table>

                <div
                    style="text-align:right; margin-top:1rem; font-size:1.5rem; font-weight:bold; color:var(--primary-red);">
                    Total: <span id="grand-total">RM 0.00</span>
                </div>

                <div style="margin-top:2rem; display:flex; gap:1rem;">
                    <button class="btn-primary" id="save-generated-quote-btn"><i class="fas fa-save"></i> Save Quote</button>
                    <button class="btn-secondary"><i class="fas fa-print"></i> Print</button>
                </div>
            </div>
        </div>
    </div>

    <!-- Chatbot (Included everywhere) -->
    <div class="chatbot-toggle">
        <i class="fas fa-comment-dots"></i>
    </div>
    <div class="chatbot-container">
        <div class="chatbot-header">
            <span>24/7 AI CHATBOT</span>
            <i class="fas fa-times close-chat" style="cursor:pointer; opacity:0.7;"></i>
        </div>
        <div class="chatbot-body" id="chat-body">
            <div class="msg bot-msg">Hello, how can I help you?</div>
        </div>
        <div class="chatbot-footer">
            <input type="text" id="chat-input-text" placeholder="Type your message">
            <button id="chat-send-btn"><i class="fas fa-paper-plane"></i></button>
        </div>
    </div>

    <script src="js/db-init.js"></script>
    <script src="js/script.js"></script>
    <script src="js/quotes-logic.js"></script>
</body>

</html>
