<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Edit Profile - Service Advisor</title>
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>
    <header class="navbar" id="main-navbar">
        <a href="index.html" class="nav-brand" id="nav-brand-link">
            <img src="images/perodua_logo.png" alt="Perodua Logo">
        </a>
        <nav class="nav-links" id="main-nav-links">
            <a href="index.html">Home</a>
            <a href="quotes.html">Quotes</a>
            <a href="knowledge.html">Knowledge Hub</a>
            <a href="locate.html">Locate</a>
        </nav>
        <div class="nav-auth" id="main-nav-auth">
            <a href="signin.html">Sign In</a>
        </div>
    </header>

    <div class="main-content">
        <div class="page-container" style="max-width: 500px;">
            <h2 class="section-title"><i class="fas fa-user-edit"></i> Edit Profile</h2>
            <form id="edit-profile-form">
                <div class="form-group">
                    <label>Full Name</label>
                    <input type="text" id="edit-name" class="form-control" required/>
                </div>
                <div class="form-group">
                    <label>Email Address</label>
                    <input type="email" id="edit-email" class="form-control" required/>
                </div>
                <div class="form-group">
                    <label>Username</label>
                    <input type="text" id="edit-username" class="form-control" required/>
                </div>
                <div class="form-group">
                    <label>Phone Number</label>
                    <input type="tel" id="edit-phone" class="form-control" required/>
                </div>
                <div class="form-group">
                    <label>Password</label>
                    <input type="password" id="edit-password" class="form-control" required/>
                </div>
                <button type="submit" class="btn-primary" style="width: 100%; margin-top: 1rem;"><i class="fas fa-save"></i> Save Changes</button>
            </form>
        </div>
    </div>

    <!-- Chatbot (Included everywhere) -->
    <div class="chatbot-toggle">
        <i class="fas fa-comment-dots"></i>
    </div>
    <div class="chatbot-container">
        <div class="chatbot-header">
            <span>24/7 AI CHATBOT</span>
            <i class="fas fa-times close-chat" style="cursor:pointer; opacity:0.7;"></i>
        </div>
        <div class="chatbot-body" id="chat-body">
            <div class="msg bot-msg">Hello, how can I help you?</div>
        </div>
        <div class="chatbot-footer">
            <input type="text" id="chat-input-text" placeholder="Type your message">
            <button id="chat-send-btn"><i class="fas fa-paper-plane"></i></button>
        </div>
    </div>

    <script src="js/db-init.js"></script>
    <script src="js/script.js"></script>

    <!-- ── Profile Loading & Saving Controller ── -->
    <script>
        (function () {
            let currentUser = null;

            /* Toast helper — matching the registration and login visual style */
            function showToast(message, type) {
                const old = document.getElementById('google-signin-toast');
                if (old) old.remove();

                const toast = document.createElement('div');
                toast.id = 'google-signin-toast';
                toast.textContent = message;
                Object.assign(toast.style, {
                    position: 'fixed', bottom: '30px', right: '30px',
                    padding: '14px 24px', borderRadius: '8px', color: '#fff',
                    fontFamily: 'Inter, Roboto, sans-serif', fontSize: '15px',
                    fontWeight: '600', boxShadow: '0 8px 24px rgba(0,0,0,0.2)',
                    zIndex: '99999', opacity: '0', transform: 'translateY(20px)',
                    transition: 'all 0.3s ease',
                    background: type === 'success'
                        ? 'linear-gradient(135deg,#34a853,#1e7e34)'
                        : 'linear-gradient(135deg,#ea4335,#b31412)'
                });
                document.body.appendChild(toast);

                requestAnimationFrame(() => {
                    toast.style.opacity = '1';
                    toast.style.transform = 'translateY(0)';
                });
                setTimeout(() => {
                    toast.style.opacity = '0';
                    toast.style.transform = 'translateY(20px)';
                    setTimeout(() => toast.remove(), 400);
                }, 3500);
            }

            // Check if user is logged in
            function checkAuth() {
                try {
                    currentUser = JSON.parse(localStorage.getItem('currentUser'));
                } catch (_) {}

                if (!currentUser) {
                    window.showModal({
                        title: "Authentication Required",
                        message: "You must be signed in to view this page. Redirecting to sign in...",
                        type: "warning",
                        confirmText: "Sign In",
                        showCancel: false,
                        onConfirm: () => {
                            window.location.href = 'signin.html';
                        }
                    });
                }
            }

            // Pre-fill profile fields
            function loadProfile() {
                if (!currentUser) return;

                document.getElementById('edit-name').value = currentUser.fullName || '';
                document.getElementById('edit-email').value = currentUser.email || '';
                document.getElementById('edit-username').value = currentUser.username || '';
                document.getElementById('edit-phone').value = currentUser.phoneNum || '';
                document.getElementById('edit-password').value = currentUser.password || '';
            }

            document.getElementById('edit-profile-form').addEventListener('submit', function (e) {
                e.preventDefault();

                if (!currentUser) return;

                const fullName = document.getElementById('edit-name').value.trim();
                const email    = document.getElementById('edit-email').value.trim();
                const username = document.getElementById('edit-username').value.trim();
                const phone    = document.getElementById('edit-phone').value.trim();
                const password = document.getElementById('edit-password').value;

                if (!fullName || !email || !username || !phone || !password) {
                    showToast('Please fill in all fields.', 'error');
                    return;
                }

                if (password.length < 6) {
                    showToast('Password must be at least 6 characters long.', 'error');
                    return;
                }

                window.showModal({
                    title: "Confirm Changes",
                    message: "Are you sure you want to save the changes to your profile?",
                    type: "info",
                    confirmText: "Save",
                    cancelText: "Cancel",
                    showCancel: true,
                    onConfirm: () => {
                        saveProfileData(fullName, email, username, phone, password);
                    }
                });
            });

            function saveProfileData(fullName, email, username, phone, password) {
                let users = [];
                try { users = JSON.parse(localStorage.getItem('userTable')) || []; } catch (_) {}

                // Check for duplicate username (excluding ourselves)
                const duplicateUsername = users.find(u =>
                    u.userID !== currentUser.userID &&
                    (u.username || '').toLowerCase() === username.toLowerCase()
                );
                if (duplicateUsername) {
                    showToast('Username is already taken. Please try another.', 'error');
                    return;
                }

                // Check for duplicate email (excluding ourselves)
                const duplicateEmail = users.find(u =>
                    u.userID !== currentUser.userID &&
                    (u.email || '').toLowerCase() === email.toLowerCase()
                );
                if (duplicateEmail) {
                    showToast('Email address is already in use by another account.', 'error');
                    return;
                }

                // Update users list
                const userIdx = users.findIndex(u => u.userID === currentUser.userID);
                if (userIdx !== -1) {
                    users[userIdx].fullName = fullName;
                    users[userIdx].email = email;
                    users[userIdx].username = username;
                    users[userIdx].phoneNum = phone;
                    users[userIdx].password = password;

                    localStorage.setItem('userTable', JSON.stringify(users));

                    // Update local storage session object
                    currentUser = users[userIdx];
                    localStorage.setItem('currentUser', JSON.stringify(currentUser));

                    // Refresh Navbar dropdown name/role instantly
                    if (typeof initNavbar === 'function') {
                        initNavbar();
                    }

                    showToast('Changes saved successfully! 🎉', 'success');
                } else {
                    showToast('Error saving profile changes. User not found.', 'error');
                }
            }

            // Run check and loader on startup
            checkAuth();
            loadProfile();

        })();
    </script>
</body>
</html>
