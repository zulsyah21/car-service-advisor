<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sign Up - Service Advisor</title>
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <!-- Google Identity Services (real OAuth 2.0) -->
    <script src="https://accounts.google.com/gsi/client" async defer></script>
    <style>
        .auth-container {
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: calc(100vh - 100px);
            padding: 2rem 0;
        }

        .auth-card {
            background: white;
            padding: 2.5rem;
            border-radius: 12px;
            box-shadow: 0 10px 25px rgba(0, 0, 0, 0.1);
            width: 100%;
            max-width: 450px;
            text-align: center;
            border-top: 5px solid var(--primary-red);
            /* Distinguish Sign Up with Red top border */
        }

        .auth-card h2 {
            color: var(--primary-green);
            margin-bottom: 2rem;
            font-size: 1.8rem;
        }

        .form-group {
            text-align: left;
        }

        .google-btn {
            background: white;
            color: #333;
            border: 1px solid #ddd;
            width: 100%;
            padding: 0.8rem;
            border-radius: 6px;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            cursor: pointer;
            font-weight: bold;
            transition: all 0.3s;
            margin-bottom: 1.5rem;
        }

        .google-btn:hover {
            background: #f5f5f5;
            box-shadow: 0 2px 5px rgba(0, 0, 0, 0.05);
        }

        .divider {
            display: flex;
            align-items: center;
            margin: 1.5rem 0;
            color: #777;
        }

        .divider::before,
        .divider::after {
            content: "";
            flex: 1;
            border-bottom: 1px solid #eee;
        }

        .divider span {
            padding: 0 10px;
            font-size: 0.9rem;
        }

        .auth-link {
            display: block;
            margin-top: 1.5rem;
            color: var(--primary-green);
            text-decoration: none;
            font-weight: bold;
        }

        .auth-link:hover {
            text-decoration: underline;
        }
    </style>
</head>

<body>

    <header class="navbar" id="main-navbar">
        <a href="index.html" class="nav-brand" id="nav-brand-link">
            <img src="images/perodua_logo.png" alt="Perodua Logo">
        </a>
        <nav class="nav-links" id="main-nav-links">
            <a href="index.html">Home</a>
            <a href="quotes.html">Quotes</a>
            <a href="knowledge.html">Knowledge Hub</a>
            <a href="locate.html">Locate</a>
        </nav>
        <div class="nav-auth" id="main-nav-auth">
            <a href="signin.html">Sign In</a>
        </div>
    </header>

    <div class="auth-container">
        <div class="auth-card">
            <h2>Create Account</h2>

            <!-- Real Google Sign-In (rendered by Google Identity Services) -->
            <div id="google-btn-container"
                 data-text="signup_with"
                 style="display:flex; justify-content:center; margin-bottom:1.5rem; min-height:44px;"></div>

            <div class="divider">
                <span>OR</span>
            </div>

            <form id="signup-form">
                <div class="form-group">
                    <label>Full Name</label>
                    <input type="text" id="signup-name" class="form-control" placeholder="John Doe" required>
                </div>

                <div class="form-group">
                    <label>Username</label>
                    <input type="text" id="signup-username" class="form-control" placeholder="johndoe" required>
                </div>

                <div class="form-group">
                    <label>Email Address</label>
                    <input type="email" id="signup-email" class="form-control" placeholder="name@example.com" required>
                </div>

                <div class="form-group">
                    <label>Phone Number</label>
                    <input type="tel" id="signup-phone" class="form-control" placeholder="e.g. 0123456789">
                </div>

                <div class="form-group">
                    <label>Password</label>
                    <input type="password" id="signup-password" class="form-control" placeholder="Minimum 6 characters" required>
                </div>

                <div class="form-group">
                    <label>Confirm Password</label>
                    <input type="password" id="signup-confirm" class="form-control" placeholder="Re-enter password" required>
                </div>

                <button type="submit" class="btn-primary"
                    style="width: 100%; background-color: var(--primary-red); border-color: var(--primary-red);">Create Account</button>
            </form>

            <a href="signin.html" class="auth-link">Already have an account? Sign In</a>
        </div>
    </div>

    <!-- Chatbot Widget -->
    <div class="chatbot-toggle">
        <i class="fas fa-comment-dots"></i>
    </div>
    <div class="chatbot-container">
        <div class="chatbot-header">
            <span>24/7 AI CHATBOT</span>
            <i class="fas fa-times close-chat" style="cursor:pointer; opacity:0.7;"></i>
        </div>
        <div class="chatbot-body" id="chat-body">
            <div class="msg bot-msg">Hello, how can I help you?</div>
        </div>
        <div class="chatbot-footer">
            <input type="text" id="chat-input-text" placeholder="Type your message">
            <button id="chat-send-btn"><i class="fas fa-paper-plane"></i></button>
        </div>
    </div>

    <script src="js/db-init.js"></script>
    <script src="js/script.js"></script>
    <script src="js/google-signin.js"></script>

    <!-- ── Credential (username/email + password) sign-up handler ── -->
    <script>
        (function () {

            /* Toast helper — matches google-signin.js style */
            function showToast(message, type) {
                const old = document.getElementById('google-signin-toast');
                if (old) old.remove();

                const toast = document.createElement('div');
                toast.id = 'google-signin-toast';
                toast.textContent = message;
                Object.assign(toast.style, {
                    position: 'fixed', bottom: '30px', right: '30px',
                    padding: '14px 24px', borderRadius: '8px', color: '#fff',
                    fontFamily: 'Inter, Roboto, sans-serif', fontSize: '15px',
                    fontWeight: '600', boxShadow: '0 8px 24px rgba(0,0,0,0.2)',
                    zIndex: '99999', opacity: '0', transform: 'translateY(20px)',
                    transition: 'all 0.3s ease',
                    background: type === 'success'
                        ? 'linear-gradient(135deg,#34a853,#1e7e34)'
                        : 'linear-gradient(135deg,#ea4335,#b31412)'
                });
                document.body.appendChild(toast);

                requestAnimationFrame(() => {
                    toast.style.opacity = '1';
                    toast.style.transform = 'translateY(0)';
                });
                setTimeout(() => {
                    toast.style.opacity = '0';
                    toast.style.transform = 'translateY(20px)';
                    setTimeout(() => toast.remove(), 400);
                }, 3500);
            }

            /* Handle form submit */
            document.getElementById('signup-form').addEventListener('submit', async function (e) {
                e.preventDefault();

                const fullName = document.getElementById('signup-name').value.trim();
                const username = document.getElementById('signup-username').value.trim();
                const email    = document.getElementById('signup-email').value.trim();
                const phone    = document.getElementById('signup-phone').value.trim();
                const password = document.getElementById('signup-password').value;
                const confirm  = document.getElementById('signup-confirm').value;

                if (!fullName || !username || !email || !password || !confirm) {
                    showToast('Please fill in all required fields.', 'error');
                    return;
                }

                if (password.length < 6) {
                    showToast('Password must be at least 6 characters long.', 'error');
                    return;
                }

                if (password !== confirm) {
                    showToast('Passwords do not match. Please verify.', 'error');
                    return;
                }

                /* Success - Create new account via API */
                const newUserID = 'u' + Date.now().toString(36);

                const newUser = {
                    userID: newUserID,
                    username: username,
                    fullName: fullName,
                    email: email,
                    password: password,
                    phoneNum: phone,
                    role: 'Customer'
                };

                try {
                    const response = await fetch('/api/users/register', {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify(newUser)
                    });

                    if (response.ok) {
                        // Auto-login the user
                        localStorage.setItem('currentUser', JSON.stringify(newUser));
                        showToast(`Welcome! Account successfully created for ${fullName}! 🎉`, 'success');
                        setTimeout(() => { window.location.href = 'index.html'; }, 1500);
                    } else {
                        const err = await response.json();
                        showToast(err.error || 'Registration failed. Please try again.', 'error');
                    }
                } catch (err) {
                    console.error('Registration error:', err);
                    // Fallback to localStorage if server is unreachable
                    let users = [];
                    try { users = JSON.parse(localStorage.getItem('userTable')) || []; } catch (_) {}

                    const duplicateUsername = users.find(u => (u.username || '').toLowerCase() === username.toLowerCase());
                    if (duplicateUsername) {
                        showToast('Username is already taken. Please try another.', 'error');
                        return;
                    }

                    users.push(newUser);
                    localStorage.setItem('userTable', JSON.stringify(users));

                    const newCustomerID = 'c' + Date.now().toString(36);
                    let customers = [];
                    try { customers = JSON.parse(localStorage.getItem('customerTable')) || []; } catch (_) {}
                    customers.push({ customerID: newCustomerID, userID: newUserID });
                    localStorage.setItem('customerTable', JSON.stringify(customers));

                    localStorage.setItem('currentUser', JSON.stringify(newUser));
                    showToast(`Welcome! Account successfully created for ${fullName}! 🎉`, 'success');
                    setTimeout(() => { window.location.href = 'index.html'; }, 1500);
                }
            });

        })();
    </script>
</body>

</html>
